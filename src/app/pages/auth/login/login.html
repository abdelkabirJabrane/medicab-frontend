<div class="login-page">

    <!-- Panel gauche : branding -->
    <div class="login-brand">
        <div class="login-brand__content">
            <div class="login-brand__logo">
                <i class="pi pi-plus"></i>
            </div>
            <h1 class="login-brand__title">MediCab Pro</h1>
            <p class="login-brand__tagline">Plateforme SaaS Médicale</p>

            <div class="login-brand__features">
                <div class="login-brand__feature">
                    <div class="login-brand__feature-icon"><i class="pi pi-calendar"></i></div>
                    <div>
                        <div class="login-brand__feature-title">Agenda intelligent</div>
                        <div class="login-brand__feature-desc">Gérez vos rendez-vous facilement</div>
                    </div>
                </div>
                <div class="login-brand__feature">
                    <div class="login-brand__feature-icon"><i class="pi pi-folder-open"></i></div>
                    <div>
                        <div class="login-brand__feature-title">Dossiers médicaux</div>
                        <div class="login-brand__feature-desc">Accès rapide aux historiques patients</div>
                    </div>
                </div>
                <div class="login-brand__feature">
                    <div class="login-brand__feature-icon"><i class="pi pi-android"></i></div>
                    <div>
                        <div class="login-brand__feature-title">IA intégrée</div>
                        <div class="login-brand__feature-desc">Analyse des symptômes assistée</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Panel droit : formulaire -->
    <div class="login-form-panel">
        <div class="login-card">

            <!-- Header -->
            <div class="login-card__header">
                <div class="login-card__icon">
                    <i class="pi pi-plus"></i>
                </div>
                <h2 class="login-card__title">Connexion</h2>
                <p class="login-card__sub">Bienvenue sur MediCab Pro</p>
            </div>

            <!-- Formulaire -->
            <div class="login-card__form">

                <div class="form-field">
                    <label class="form-label">Nom d'utilisateur</label>
                    <div class="form-input-wrap">
                        <i class="pi pi-user form-input-icon"></i>
                        <input class="form-input"
                               pInputText
                               type="text"
                               [(ngModel)]="username"
                               placeholder="Votre nom d'utilisateur"
                               (keyup.enter)="onLogin()"/>
                    </div>
                </div>

                <div class="form-field">
                    <label class="form-label">Mot de passe</label>
                    <div class="form-input-wrap">
                        <i class="pi pi-lock form-input-icon"></i>
                        <input class="form-input form-input--password"
                               [type]="showPassword ? 'text' : 'password'"
                               [(ngModel)]="password"
                               placeholder="••••••••"
                               (keyup.enter)="onLogin()"/>
                        <button class="form-input-toggle" type="button"
                                (click)="showPassword = !showPassword">
                            <i [class]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
                        </button>
                    </div>
                </div>

                <!-- Erreur -->
                @if (errorMessage) {
                    <div class="login-error">
                        <i class="pi pi-exclamation-circle"></i>
                        {{ errorMessage }}
                    </div>
                }

                <!-- Bouton connexion -->
                <button class="btn-login" [class.btn-login--loading]="loading" (click)="onLogin()" [disabled]="loading">
                    @if (loading) {
                        <i class="pi pi-spin pi-spinner"></i> Connexion...
                    } @else {
                        <i class="pi pi-sign-in"></i> Se connecter
                    }
                </button>

            </div>

            <!-- Divider -->
            <div class="login-divider">
                <span class="login-divider__line"></span>
                <span class="login-divider__text">Accès rapide</span>
                <span class="login-divider__line"></span>
            </div>

            <!-- Rôles -->
            <div class="roles-grid">

                <button class="role-card role-card--blue" (click)="loginAs('medecin')">
                    <div class="role-card__icon"><i class="pi pi-user"></i></div>
                    <div class="role-card__info">
                        <div class="role-card__name">Médecin</div>
                        <div class="role-card__email">medecin&#64;medicab.ma</div>
                    </div>
                </button>

                <button class="role-card role-card--green" (click)="loginAs('secretaire')">
                    <div class="role-card__icon"><i class="pi pi-briefcase"></i></div>
                    <div class="role-card__info">
                        <div class="role-card__name">Secrétaire</div>
                        <div class="role-card__email">secretaire&#64;medicab.ma</div>
                    </div>
                </button>

                <button class="role-card role-card--orange" (click)="loginAs('admin')">
                    <div class="role-card__icon"><i class="pi pi-cog"></i></div>
                    <div class="role-card__info">
                        <div class="role-card__name">Super Admin</div>
                        <div class="role-card__email">admin&#64;medicab.ma</div>
                    </div>
                </button>

                <button class="role-card role-card--purple" (click)="loginAs('patient')">
                    <div class="role-card__icon"><i class="pi pi-heart"></i></div>
                    <div class="role-card__info">
                        <div class="role-card__name">Patient</div>
                        <div class="role-card__email">patient&#64;medicab.ma</div>
                    </div>
                </button>

            </div>

        </div>
    </div>

</div>
