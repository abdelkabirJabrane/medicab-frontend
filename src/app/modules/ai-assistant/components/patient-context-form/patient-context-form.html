<div class="context-drawer">
  <h3>Contexte Patient</h3>
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Médecin</label>
      <input type="text" [(ngModel)]="context.nom_medecin" name="medecin" disabled>
    </div>
    
    <div class="form-group">
      <label>Nom Patient</label>
      <p-autoComplete 
        [(ngModel)]="selectedPatient" 
        [suggestions]="filteredPatients" 
        (completeMethod)="searchPatients($event)" 
        (onSelect)="onPatientSelect($event)"
        optionLabel="displayName" 
        placeholder="Rechercher un patient..."
        [style]="{'width':'100%'}"
        [inputStyle]="{'width':'100%'}"
        name="patient">
        <ng-template let-patient pTemplate="item">
            <div class="flex align-items-center">
                <span>{{ patient.displayName }}</span>
            </div>
        </ng-template>
      </p-autoComplete>
    </div>
    
    <div class="form-group row">
      <div class="half">
        <label>Âge</label>
        <input type="text" [(ngModel)]="context.age" name="age">
      </div>
      <div class="half">
        <label>Sexe</label>
        <select [(ngModel)]="context.sexe" name="sexe">
            <option value="M">M</option>
            <option value="F">F</option>
        </select>
      </div>
    </div>
    
    <div class="form-group">
      <label>Antécédents</label>
      <textarea [(ngModel)]="context.antecedents" name="antecedents"></textarea>
    </div>

    <div class="form-group">
      <label>Allergies</label>
      <input type="text" [(ngModel)]="context.allergies" name="allergies">
    </div>

    <div class="form-group">
      <label>Médicaments Actuels</label>
      <textarea [(ngModel)]="context.medicaments_actuels" name="medicaments"></textarea>
    </div>
    
    <button type="submit" class="btn-start">Commencer Session</button>
  </form>
</div>
